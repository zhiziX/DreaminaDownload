<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智子X 即梦解析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 360px;
            min-height: 320px;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 36%, #f6f7fb 100%);
            color: #1f2937;
        }
        .content { padding: 14px; }
        .card {
            background: white;
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
            margin-bottom: 12px;
        }
        .promo-card {
            background: linear-gradient(135deg, #111827, #1e3a8a);
            color: white;
        }
        .promo-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .promo-copy {
            min-width: 0;
            flex: 1;
        }
        .promo-title {
            font-size: 15px;
            font-weight: 800;
        }
        .promo-text {
            margin-top: 8px;
            font-size: 12px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.84);
        }
        .promo-btn {
            margin-top: 12px;
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            background: linear-gradient(135deg, #22c55e, #3b82f6);
            color: white;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .setting-copy {
            min-width: 0;
            flex: 1;
            padding-top: 2px;
        }
        .setting-title {
            font-size: 13px;
            font-weight: 700;
        }
        .setting-text {
            margin-top: 4px;
            font-size: 11px;
            color: #6b7280;
            line-height: 1.5;
        }
        .switch {
            position: relative;
            width: 46px;
            height: 28px;
            flex-shrink: 0;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            background: #cbd5e1;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .slider::before {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            left: 3px;
            top: 3px;
            border-radius: 999px;
            background: white;
            transition: transform 0.2s ease;
            box-shadow: 0 2px 6px rgba(15, 23, 42, 0.18);
        }
        .switch input:checked + .slider {
            background: linear-gradient(135deg, #22c55e, #3b82f6);
        }
        .switch input:checked + .slider::before {
            transform: translateX(18px);
        }
        .status-value {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 999px;
        }
        .status-active { background: #16a34a; }
        .status-inactive { background: #dc2626; }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            background: #0f766e;
            color: white;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-download {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }
        .media-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 260px;
            overflow-y: auto;
        }
        .media-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
        }
        .media-meta {
            min-width: 0;
            flex: 1;
        }
        .media-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .media-url,
        .media-source {
            font-size: 11px;
            color: #6b7280;
            word-break: break-all;
        }
        .media-source {
            margin-top: 4px;
        }
        .media-download-btn {
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            background: #1d4ed8;
            color: white;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
        }
        .media-download-btn:disabled {
            opacity: 0.7;
            cursor: default;
        }
        .empty-state,
        .loading {
            text-align: center;
            font-size: 12px;
            color: #6b7280;
            padding: 8px 0;
        }
        .footer {
            padding: 0 14px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 12px;
        }
        .footer-left {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .footer-toggle-label {
            font-size: 12px;
            font-weight: 700;
            color: #1f2937;
            white-space: nowrap;
        }
        .footer-links {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .footer-link {
            color: #1d4ed8;
            text-decoration: none;
            font-weight: 600;
        }
        .footer-link:hover {
            text-decoration: underline;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="content">
        <div class="card promo-card">
            <div class="promo-head">
                <div class="promo-copy">
                    <div class="promo-title">智子X即梦解析</div>
                    <div class="promo-text">开启更多工具和解析能力</div>
                </div>
            </div>
            <button class="promo-btn" data-url="https://zhizix.com">去智子X看看</button>
        </div>
        <div class="card">
            <div class="status-row">
                <div class="status-left">
                    <span>解析状态</span>
                </div>
                <span class="status-value">
                    <span id="pluginStatus">检测中...</span>
                    <span class="status-indicator status-inactive" id="statusIndicator"></span>
                </span>
            </div>
        </div>
        <div class="card">
            <div class="media-list" id="mediaList"></div>
            <div class="empty-state" id="emptyState">当前页面没有可下载的解析结果。</div>
            <div class="actions hidden" id="primaryActionWrap">
                <button class="btn btn-download" id="primaryDownloadBtn">去水印下载</button>
            </div>
        </div>
    </div>
    <div class="footer">
        <div class="footer-left">
            <span class="footer-toggle-label">网页下载按钮</span>
            <label class="switch">
                <input type="checkbox" id="floatingDownloadToggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="footer-links">
            <a class="footer-link" href="https://zhizix.com" target="_blank" rel="noreferrer">zhizix.com</a>
            <a class="footer-link" href="https://github.com/zhiziX" target="_blank" rel="noreferrer">GitHub</a>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
